      {"@type":"Question","name":"How long do I have to file a personal injury claim in California?","acceptedAnswer":{"@type":"Answer","text":"In California, you generally have 2 years from the date of your injury to file a personal injury lawsuit. This is called the statute of limitations. If you were injured by a government entity, the deadline is much shorter — just 6 months to file a government claim. Don't wait. Evidence disappears, witnesses forget details, and missing the deadline means losing your right to compensation entirely."}},
      {"@type":"Question","name":"How much does a personal injury attorney cost?","acceptedAnswer":{"@type":"Answer","text":"Nothing upfront — and nothing at all unless you win. Personal injury attorneys in California work on a contingency fee basis, meaning the fee (typically 33% of the settlement) only comes out of your recovery. If we don't win, you don't pay. There is no financial risk to getting legal help."}},
      {"@type":"Question","name":"Should I accept the insurance company's first settlement offer?","acceptedAnswer":{"@type":"Answer","text":"Almost never. Insurance companies are businesses — their goal is to pay you as little as possible, as fast as possible, before you understand the full value of your claim. First offers routinely undervalue medical costs, future treatment, lost wages, and pain and suffering. Before accepting anything, speak with an attorney."}},
      {"@type":"Question","name":"What should I do immediately after a car accident in California?","acceptedAnswer":{"@type":"Answer","text":"Call 911, document everything with photos, don't admit fault, get medical attention immediately even if you feel fine, do not speak to the other driver's insurance company without an attorney, and call for a free case review before signing anything."}},
      {"@type":"Question","name":"What if the other driver was uninsured or underinsured?","acceptedAnswer":{"@type":"Answer","text":"You may still have options through your own uninsured motorist coverage, or through other liable parties such as employers, vehicle owners, or government entities responsible for road conditions. Don't assume you have no case just because the other driver had no insurance."}},
      {"@type":"Question","name":"How long does a personal injury case take in California?","acceptedAnswer":{"@type":"Answer","text":"Most personal injury cases in California settle within 6 to 18 months without going to trial. Cases that go to trial can take 2-3 years. The timeline depends on the severity of injuries, how quickly you reach maximum medical improvement, and how cooperative the insurance company is."}},
      {"@type":"Question","name":"Who can file a wrongful death claim in California?","acceptedAnswer":{"@type":"Answer","text":"In California, the following people may file a wrongful death claim: surviving spouse or domestic partner, children of the deceased, and in some cases parents or siblings if there are no surviving spouse or children. The claim must be filed within 2 years of the date of death."}},
      {"@type":"Question","name":"What is my injury case worth?","acceptedAnswer":{"@type":"Answer","text":"Compensation in a personal injury case typically covers medical bills, lost wages and lost earning capacity, pain and suffering, emotional distress, and property damage. The only way to know what your case is truly worth is to have an attorney review the specific facts."}}
